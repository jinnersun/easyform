<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyForm Test - Contact Us</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      margin-bottom: 16px;
    }
    h1 {
      color: #f1f5f9;
      font-size: 28px;
      margin-bottom: 8px;
    }
    p {
      color: #94a3b8;
      margin-bottom: 32px;
      font-size: 15px;
    }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    textarea { resize: vertical; min-height: 100px; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .footer {
      text-align: center;
      margin-top: 24px;
      color: #64748b;
      font-size: 13px;
    }
    .footer a { color: #818cf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Powered by EasyForm</span>
    <h1>Contact Us</h1>
    <p>Have a question or feedback? Drop us a message and we'll get back to you.</p>

    <form data-easyform>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="Name" placeholder="John Doe" required>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="Email" placeholder="john@example.com" required>
      </div>

      <div class="field">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="Subject" placeholder="What's this about?">
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="Message" placeholder="Tell us more..." required></textarea>
      </div>

      <button type="submit">Send Message</button>
    </form>

    <div class="footer">
      Form backend by <a href="https://www.easyform.dpdns.org" target="_blank">EasyForm</a>
      — No server needed.
    </div>
  </div>

  <!-- EasyForm embed script -->
  <script src="https://www.easyform.dpdns.org/easyform.js"
   data-email="358042175@163.com"></script>
</body>
</html>
