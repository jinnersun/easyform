<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EasyForm Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 20px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 40px 0;
      padding: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }
    input, textarea {
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    h1 {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  <h1>EasyForm Demo</h1>
  <p>这是一个演示页面，展示 EasyForm 如何工作。</p>

  <!-- 注意: 部署后把 YOUR_FORM_ID 替换为真实的表单 ID -->
  <form data-easyform="YOUR_FORM_ID">
    <label>邮箱</label>
    <input name="email" type="email" placeholder="your@email.com" required>

    <label>姓名</label>
    <input name="name" placeholder="你的名字">

    <label>留言</label>
    <textarea name="message" rows="4" placeholder="有什么想告诉我们的？"></textarea>

    <button type="submit">提交</button>
  </form>

  <p style="color: #666; font-size: 14px;">
    提交后，数据会自动保存到 Cloudflare D1 数据库，
    你可以通过 API 获取所有提交记录。
  </p>

  <script src="/easyform.js" data-form="YOUR_FORM_ID"></script>
</body>
</html>
